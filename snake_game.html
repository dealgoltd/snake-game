<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
  }

  h1 {
    font-size: 2.2rem;
    letter-spacing: 6px;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff8888;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .score-board {
    display: flex;
    gap: 40px;
    margin-bottom: 16px;
  }

  .score-item {
    text-align: center;
  }

  .score-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: #888;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 1.8rem;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff8844;
  }

  #gameCanvas {
    border: 2px solid #00ff8844;
    border-radius: 8px;
    box-shadow: 0 0 40px #00ff8822, inset 0 0 40px #00000044;
    background: #050510;
    display: block;
  }

  .controls {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .ctrl-btn {
    width: 50px;
    height: 50px;
    background: #1a1a2e;
    border: 1px solid #00ff8844;
    border-radius: 8px;
    color: #00ff88;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ctrl-btn:active {
    background: #00ff8822;
    transform: scale(0.92);
  }

  #startBtn {
    margin-top: 12px;
    padding: 12px 40px;
    background: #00ff88;
    color: #0a0a1a;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 20px #00ff8866;
  }

  #startBtn:hover {
    background: #00ffaa;
    box-shadow: 0 0 30px #00ff88aa;
    transform: scale(1.05);
  }

  .hint {
    margin-top: 10px;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 1px;
  }

  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  #overlay h2 {
    font-size: 1.5rem;
    color: #ff4466;
    text-shadow: 0 0 20px #ff446688;
    letter-spacing: 3px;
  }

  #overlay p {
    color: #888;
    font-size: 0.85rem;
  }

  .canvas-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<h1>🐍 Snake</h1>

<div class="score-board">
  <div class="score-item">
    <div class="score-label">Score</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-item">
    <div class="score-label">Best</div>
    <div class="score-value" id="best">0</div>
  </div>
  <div class="score-item">
    <div class="score-label">Level</div>
    <div class="score-value" id="level">1</div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="gameCanvas" width="360" height="360"></canvas>
  <div id="overlay">
    <h2 id="overlayTitle">SNAKE</h2>
    <p id="overlayMsg">Press START to play</p>
  </div>
</div>

<div class="controls">
  <div class="btn-row">
    <button class="ctrl-btn" onclick="changeDir(0,-1)">▲</button>
  </div>
  <div class="btn-row">
    <button class="ctrl-btn" onclick="changeDir(-1,0)">◀</button>
    <button class="ctrl-btn" onclick="changeDir(0,1)">▼</button>
    <button class="ctrl-btn" onclick="changeDir(1,0)">▶</button>
  </div>
</div>

<button id="startBtn" onclick="startGame()">▶ START</button>
<p class="hint">Keyboard: Arrow Keys | Touch: Buttons above</p>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CELL = 18;
const COLS = Math.floor(canvas.width / CELL);
const ROWS = Math.floor(canvas.height / CELL);

let snake, dir, nextDir, food, score, best, level, gameLoop, running, bonus;

function init() {
  snake = [{x:10, y:10}, {x:9,y:10}, {x:8,y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  level = 1;
  best = parseInt(localStorage.getItem('snakeBest') || '0');
  placeFood();
  placeBonus();
  updateUI();
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
}

function placeBonus() {
  bonus = null;
  if (Math.random() > 0.6) {
    setTimeout(() => {
      do {
        bonus = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS), life: 80};
      } while (snake.some(s => s.x===bonus.x && s.y===bonus.y));
    }, 3000);
  }
}

function changeDir(dx, dy) {
  if (dx === -dir.x && dy === -dir.y) return;
  nextDir = {x:dx, y:dy};
}

function startGame() {
  if (gameLoop) clearInterval(gameLoop);
  document.getElementById('overlay').style.display = 'none';
  init();
  running = true;
  let speed = 150;
  gameLoop = setInterval(() => {
    update();
    draw();
  }, speed);
  document.getElementById('startBtn').textContent = '↺ RESTART';
}

function update() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    if (score > best) { best = score; localStorage.setItem('snakeBest', best); }
    level = Math.floor(score / 100) + 1;
    placeFood();
    placeBonus();
    updateUI();
    // Speed up
    if (score % 50 === 0) {
      clearInterval(gameLoop);
      let speed = Math.max(60, 150 - level * 10);
      gameLoop = setInterval(() => { update(); draw(); }, speed);
    }
  } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
    score += 30 * level;
    bonus = null;
    updateUI();
  } else {
    snake.pop();
  }

  if (bonus) bonus.life--;
  if (bonus && bonus.life <= 0) bonus = null;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#ffffff06';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
  }
  for (let y = 0; y < ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
  }

  // Snake
  snake.forEach((seg, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    const green = Math.floor(255 * alpha);
    ctx.fillStyle = i === 0 ? '#00ff88' : `rgba(0, ${green}, ${Math.floor(green*0.5)}, ${alpha})`;
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = i === 0 ? 12 : 4;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, i===0 ? 5 : 3);
    ctx.fill();
  });

  // Eyes on head
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  const h = snake[0];
  if (dir.x === 1) {
    ctx.fillRect(h.x*CELL+12, h.y*CELL+4, 3, 3);
    ctx.fillRect(h.x*CELL+12, h.y*CELL+11, 3, 3);
  } else if (dir.x === -1) {
    ctx.fillRect(h.x*CELL+3, h.y*CELL+4, 3, 3);
    ctx.fillRect(h.x*CELL+3, h.y*CELL+11, 3, 3);
  } else if (dir.y === -1) {
    ctx.fillRect(h.x*CELL+4, h.y*CELL+3, 3, 3);
    ctx.fillRect(h.x*CELL+11, h.y*CELL+3, 3, 3);
  } else {
    ctx.fillRect(h.x*CELL+4, h.y*CELL+12, 3, 3);
    ctx.fillRect(h.x*CELL+11, h.y*CELL+12, 3, 3);
  }

  // Food (apple)
  ctx.shadowColor = '#ff4466';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4466';
  ctx.beginPath();
  ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffcc00';
  ctx.font = `${CELL-4}px serif`;
  ctx.fillText('🍎', food.x*CELL, food.y*CELL + CELL - 2);

  // Bonus
  if (bonus) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 150);
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 10 + pulse * 10;
    ctx.font = `${CELL-2}px serif`;
    ctx.fillText('⭐', bonus.x*CELL, bonus.y*CELL + CELL - 2);
  }

  ctx.shadowBlur = 0;
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
}

function endGame() {
  clearInterval(gameLoop);
  running = false;
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  document.getElementById('overlayTitle').textContent = 'GAME OVER';
  document.getElementById('overlayMsg').textContent = `Score: ${score} | Best: ${best}`;
  document.getElementById('startBtn').textContent = '↺ PLAY AGAIN';
}

// Keyboard
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key==='ArrowUp') changeDir(0,-1);
  else if (e.key==='ArrowDown') changeDir(0,1);
  else if (e.key==='ArrowLeft') changeDir(-1,0);
  else if (e.key==='ArrowRight') changeDir(1,0);
});

// Touch swipe
let tx, ty;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) changeDir(dx>0?1:-1, 0);
  else changeDir(0, dy>0?1:-1);
}, {passive:true});

// First draw
init();
draw();
</script>
</body>
</html>
